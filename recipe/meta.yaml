{% set name = "iso4217" %}
{% set version = "1.13.20250512" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 13df49c199255e1c333dda7f9019b76f7e6f54190e8b49875216e7cc8a8781d2

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.6
    - pip
  run:
    - python >=3.6
    - setuptools

test:
  imports:
    - iso4217
    - iso4217.test

about:
  home: https://github.com/dahlia/iso4217
  license: Public Domain
  license_family: PUBLIC-DOMAIN
  summary: ISO 4217 currency data package for Python

  doc_url: ''
  dev_url: https://github.com/dahlia/iso4217

extra:
  recipe-maintainers:
    - gerrymanoim
    - jbredeche
    - jdricklefs
    - llllllllll
    - richafrank
